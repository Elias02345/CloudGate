# CloudGate recovery-mode nginx config.
# Activated when bootstrap failed — routes everything to recovery-ui.

server {
	listen 80 default_server;
	listen [::]:80 default_server;
	server_name _;

	location / {
		proxy_pass http://127.0.0.1:8001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	}

	server_tokens off;
}
