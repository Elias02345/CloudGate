# CloudGate normal-mode nginx config.
# Activated when bootstrap succeeded.

server {
	listen 80 default_server;
	listen [::]:80 default_server;
	server_name _;

	root /app/frontend;
	index index.html;

	# Serve static frontend
	location / {
		try_files $uri $uri/ /index.html;
	}

	# i18n locale files
	location /locales/ {
		alias /app/frontend/locales/;
		expires 1h;
		add_header Cache-Control "public, max-age=3600";
	}

	# Backend API
	location /api/ {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 600s;
		proxy_send_timeout 600s;
	}

	# Recovery UI accessible via /__recovery (handy even on healthy systems)
	location /__recovery/ {
		proxy_pass http://127.0.0.1:8001/;
		proxy_set_header Host $host;
	}

	# Hide nginx version
	server_tokens off;
}

# Future: per-host configs generated by the backend land in
# /data/nginx/hosts/*.conf and are included from a master nginx.conf
# (wired up in M3 — Hybrid Mode).
include /data/nginx/hosts/*.conf;
