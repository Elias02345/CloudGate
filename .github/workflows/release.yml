name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm -r run build

      - name: Build release tarball
        run: |
          set -e
          mkdir -p release-staging/cloudgate

          # backend + recovery-ui are Node services — they need their
          # production-only node_modules included so apply-update.sh can
          # run `node ./node_modules/.bin/knex migrate:latest` against the
          # new /app/backend/ without falling back to the old copy.
          #
          # `pnpm deploy --prod` produces a self-contained directory with
          # dist/, package.json, and node_modules/ (production deps only),
          # which is exactly what apply-update.sh expects after swap.
          pnpm --filter @cloudgate/backend deploy --prod release-staging/cloudgate/backend
          pnpm --filter @cloudgate/recovery-ui deploy --prod release-staging/cloudgate/recovery-ui

          # frontend is a SPA — just static dist/.
          cp -r packages/frontend/dist release-staging/cloudgate/frontend

          # version + changelog
          cp packages/backend/.version release-staging/cloudgate/ 2>/dev/null \
            || echo "${{ steps.version.outputs.version }}" > release-staging/cloudgate/.version
          cp CHANGELOG.md release-staging/cloudgate/ 2>/dev/null \
            || echo "(no CHANGELOG yet)" > release-staging/cloudgate/CHANGELOG.md

          # Sanity check — the apply-update.sh contract is "backend has knex"
          if [ ! -x release-staging/cloudgate/backend/node_modules/.bin/knex ]; then
            echo "::error::release tarball missing backend/node_modules/.bin/knex — apply-update.sh would fail"
            ls -la release-staging/cloudgate/backend/
            exit 1
          fi
          echo "tarball staging:"
          du -sh release-staging/cloudgate/* | sort -k2

          cd release-staging
          tar -czf ../cloudgate-${{ steps.version.outputs.tag }}.tar.gz cloudgate

      - name: Generate SHA256
        run: |
          sha256sum cloudgate-${{ steps.version.outputs.tag }}.tar.gz \
            > cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sha256
          cat cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sha256

      # GPG signing is OPTIONAL — release succeeds without it, but the updater
      # will warn unsigned downloads. Set the GPG_PRIVATE_KEY + GPG_PASSPHRASE
      # secrets to enable signed releases.
      - name: Check for GPG secrets
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "GPG signing enabled"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GPG_PRIVATE_KEY secret not set — release will be unsigned"
          fi

      - name: Import GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys

      - name: Sign release artifact
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor \
            --output cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sig \
            cloudgate-${{ steps.version.outputs.tag }}.tar.gz

      - name: Collect release files
        id: files
        run: |
          files="cloudgate-${{ steps.version.outputs.tag }}.tar.gz cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sha256"
          if [ -f "cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sig" ]; then
            files="$files cloudgate-${{ steps.version.outputs.tag }}.tar.gz.sig"
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          for f in $files; do echo "$f"; done >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.files.outputs.files }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/elias02345/cloudgate:${{ steps.version.outputs.tag }}
            ghcr.io/elias02345/cloudgate:latest
            ghcr.io/elias02345/cloudgate:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
