name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint
        continue-on-error: true # biome is strict; don't block PRs in pre-alpha

      - name: Test
        run: pnpm -r run test

      - name: Build
        run: pnpm -r run build

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: cloudgate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test image starts
        run: |
          docker run -d --name cg-test -p 8080:80 cloudgate:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              docker logs cg-test
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become healthy in 30s"
          docker logs cg-test
          exit 1
